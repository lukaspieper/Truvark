name: continuous

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

permissions:
  contents: read

jobs:
  detekt:
    uses: ./.github/workflows/lint-detekt.yml

  lint:
    uses: ./.github/workflows/lint.yml

  build:
    uses: ./.github/workflows/assembleDebug.yml

  jvmtests:
    uses: ./.github/workflows/tests-jvm.yml

  licensing:
    name: Run License Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint licensing
        uses: fsfe/reuse-action@v6
