name: Run Android Linter workflow

on: [workflow_call]

jobs:
  lint:
    name: Run Android Linter
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Setup
      uses: ./.github/actions/setup

    - name: Run Lint
      run: ./gradlew lint

    - name: Upload Markdown Report
      if: success() || failure()
      run: |
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>Show Report</summary>" >> $GITHUB_STEP_SUMMARY
        sed -n '/<body/,/<\/body>/p' androidApp/build/reports/lint-results-debug.html >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY

    - name: Upload HTML Reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: success() || failure()
      with:
        name: Lint-HTML
        path: androidApp/build/reports/lint-results-debug.html

    - name: Upload SARIF Report
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      if: success() || failure()
      with:
        sarif_file: androidApp/build/reports/lint-results-debug.sarif
