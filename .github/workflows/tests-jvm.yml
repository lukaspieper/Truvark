name: Run JVM Tests workflow

on: [workflow_call]

jobs:
  jvmtests:
    name: Run JVM Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run JVM Tests
      run: ./gradlew desktopTest

    - name: Upload Markdown Report
      run: |
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>Show Report</summary>" >> $GITHUB_STEP_SUMMARY
        sed -n '/<body>/,/<\/body>/p' composeApp/build/reports/tests/desktopTest/index.html >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
      if: success() || failure()

    - name: Upload HTML Reports
      uses: actions/upload-artifact@v7
      if: success() || failure()
      with:
        name: Tests-HTML
        path: composeApp/build/reports/tests
