output-reports:
  active: true
  exclude:
    - 'TxtOutputReport'
    - 'XmlOutputReport'

complexity:
  # Missing ignoreAnnotated for LongMethod and CyclomaticComplexMethod to ignore Composable functions
  CyclomaticComplexMethod:
    threshold: 30
  LongMethod:
    threshold: 300
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
    ignoreAnnotated: [ 'Composable' ]
  TooManyFunctions:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false

formatting:
  MaximumLineLength:
    excludes: [ '**/src/*Test/**' ]
  NoWildcardImports:
    active: false

naming:
  MatchingDeclarationName:
    excludes: [ '**/ui/controls/**' ]
  FunctionNaming:
    ignoreAnnotated: [ 'Composable', 'Test', 'ParameterizedTest' ]

style:
  ForbiddenComment:
    active: false
  MagicNumber:
    ignoreAnnotation: true
    excludes: [ '**/ui/**', '**.kts', '**/src/*Test/**' ]
  MaxLineLength:
    excludes: [ '**/src/*Test/**' ]
  UnnecessaryAbstractClass:
    excludes: [ '**/src/*Test/**' ]
  WildcardImport:
    active: false
  ReturnCount:
    max: 3
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'PagePreviews'
      - 'ElementPreviews'

Compose:
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: false
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ContentTrailingLambda:
    active: true
  ContentSlotReused:
    active: true
  DefaultsVisibility:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  Material2:
    active: true
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: false
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: false
  PreviewNaming:
    active: false
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  RememberContentMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
